name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - run: npm run coverage
      - name: Enforce coverage threshold
        run: |
          node -e "
          const c = require('./coverage/coverage-summary.json').total.statements.pct;
          if (c < 90) { console.error('Coverage', c, '< 90%'); process.exit(1); }
          console.log('Coverage OK:', c + '%');
          "
      - run: npm run benchmark
      - name: Slither (optional)
        continue-on-error: true
        run: |
          pip install slither-analyzer
          npm run slither

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run ui:build
      - run: npm run ui:test
